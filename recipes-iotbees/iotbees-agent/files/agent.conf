# IoT Bees agent configuration
# Edit these values, then restart: systemctl restart iotbees-agent

device_id = gateway-001

# --- Modbus TCP source (the device you read FROM) ---
modbus_host  = 127.0.0.1
modbus_port  = 502
modbus_reg   = 0
modbus_count = 1

# --- MQTT output (your cloud broker - the server you push TO) ---
mqtt_broker       = tcp://localhost:1883
mqtt_client_id    = iotbees-gateway

# --- Token auth (so the cloud only accepts authenticated pushes) ---
# Leave blank for an open broker. Set these to authenticate the device.
mqtt_username =
mqtt_token    =

mqtt_topic_data   = iotbees/data
mqtt_topic_health = iotbees/health

# publish interval, seconds (the normal sample rate)
interval_sec = 5

# --- Adaptive sample rate under disk pressure (worst-case / offline) ---
# When disk used % reaches disk_backoff_pct, the agent slows the sample rate
# (stretches the interval up to max_interval_sec) to make space last; it returns
# to interval_sec once the disk recovers.
max_interval_sec = 300
disk_backoff_pct = 85
