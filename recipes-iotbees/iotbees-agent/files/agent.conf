# IoT Bees agent configuration
# Edit these values, then restart: systemctl restart iotbees-agent

device_id = gateway-001

# --- Modbus TCP source (the device you read FROM) ---
modbus_host  = 127.0.0.1
modbus_port  = 502
modbus_reg   = 0
modbus_count = 1

# --- MQTT output (your cloud broker - the server you push TO) ---
mqtt_broker       = tcp://localhost:1883
mqtt_client_id    = iotbees-gateway
mqtt_topic_data   = iotbees/data
mqtt_topic_health = iotbees/health

# publish interval, seconds
interval_sec = 5
